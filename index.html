    <style>
        /* Custom CSS for animations and enhanced styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0d0d0d 100%);
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(76, 0, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 128, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(0, 255, 255, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: pulseGlow 8s ease-in-out infinite;
        }

        @keyframes pulseGlow {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        /* Main container */
        .main-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }

        /* Off-canvas customization */
        .offcanvas {
            background: linear-gradient(145deg, #0f0f0f 0%, #1a1a1a 100%);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .offcanvas-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .offcanvas-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Card styling */
        .business-card-wrapper {
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-container {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 0 30px rgba(102, 126, 234, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.03) 0%, transparent 70%);
            animation: rotateGradient 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateGradient {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .card-container:hover {
            transform: translateY(-10px);
            box-shadow:
                0 35px 60px -15px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(102, 126, 234, 0.3) inset,
                0 0 40px rgba(102, 126, 234, 0.15);
        }

        /* Avatar styling */
        .avatar-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .avatar-wrapper:hover {
            transform: scale(1.05);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(45deg, #667eea, #764ba2, #f093fb) border-box;
            /* -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); */
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            }

            50% {
                box-shadow: 0 0 40px rgba(118, 75, 162, 0.5);
            }
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            border: 3px solid rgba(255, 255, 255, 0.2);
        }

        /* Name styling */
        .name-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #e0e7ff 50%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            animation: textShimmer 3s ease-in-out infinite;
        }

        @keyframes textShimmer {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.85;
            }
        }

        .job-title {

            font-size: clamp(16px, 3vw, 20px);
            font-weight: 500;
            color: #a78bfa;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }

        .job-title::before,
        .job-title::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #a78bfa, transparent);
        }

        .job-title::before {
            right: 100%;
            margin-right: 15px;
        }

        .job-title::after {
            left: 100%;
            margin-left: 15px;
        }

        /* Social links grid */
        .social-grid {

        .social-btn {

            overflow: hidden;

        .social-btn::before {
            content: '';

            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn:hover {
            transform: translateY(-5px);
            border-color: rgba(102, 126, 234, 0.5);

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            color: #9ca3af;
            text-decoration: none;
            font-family: 'Raleway', sans-serif;

        .nav-link:hover {
            background: rgba(102, 126, 234, 0.1);
            color: white;
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateX(5px);
        }

        /* Responsive adjustments */
        @media (max-width: 576px) {
            .card-container {
                padding: 25px 20px;

            .social-grid {

                gap: 10px;

            .social-btn {

            }

        @media (min-width: 768px) and (max-width: 991px) {

            }
        }

        /* Loading animation */

            display: none;
        }

        /* Custom scrollbar */

            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {

            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }
    </style>
</head>

    <script>
        // Wait for DOM to load
        document.addEventListener('DOMContentLoaded', function () {
            console.log('Business Card Loaded - Sulaimon Abdulmalique Shaquille');

            // Add loaded class to body for initial animations
            document.body.classList.add('loaded');

            // Initialize tooltips (Bootstrap)
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
            });
        });

        // Avatar click animation
        function animateAvatar() {
            const avatar = document.querySelector('.avatar-wrapper');
            avatar.style.transform = 'scale(0.95)';
            setTimeout(() => {
                avatar.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    avatar.style.transform = 'scale(1)';
                }, 100);
            }, 100);

            // Add sparkle effect
            createSparkle(avatar);
        }

        // Create sparkle effect
        function createSparkle(element) {
            const rect = element.getBoundingClientRect();
            for (let i = 0; i < 5; i++) {
                const sparkle = document.createElement('div');
                sparkle.style.position = 'fixed';
                sparkle.style.left = rect.left + rect.width / 2 + 'px';
                sparkle.style.top = rect.top + rect.height / 2 + 'px';
                sparkle.style.width = '4px';
                sparkle.style.height = '4px';
                sparkle.style.borderRadius = '50%';
                sparkle.style.background = '#a78bfa';
                sparkle.style.pointerEvents = 'none';
                sparkle.style.zIndex = '1000';
                sparkle.style.transition = 'all 0.6s ease-out';
                document.body.appendChild(sparkle);

                const angle = (i * 72) * (Math.PI / 180);
                const distance = 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                setTimeout(() => {
                    sparkle.style.transform = `translate(${tx}px, ${ty}px)`;
                    sparkle.style.opacity = '0';
                }, 10);

                setTimeout(() => {
                    sparkle.remove();
                }, 600);
            }
        }

        // Social button click tracking with animation
        const socialButtons = document.querySelectorAll('.social-btn');
        socialButtons.forEach(btn => {
            btn.addEventListener('click', function (e) {
                // Add click animation
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 150);

                // Log which platform was clicked
                const platform = this.getAttribute('data-platform');
                console.log(`Social link clicked: ${platform}`);

                // Create ripple effect
                createRipple(e, this);
            });

            // Hover animation enhancement
            btn.addEventListener('mouseenter', function () {
                const icon = this.querySelector('i');
                icon.style.transform = 'scale(1.1)';
            });

            btn.addEventListener('mouseleave', function () {
                const icon = this.querySelector('i');
                icon.style.transform = 'scale(1)';
            });
        });

        // Contact button animation and tracking
        const contactBtn = document.getElementById('contactBtn');
        contactBtn.addEventListener('click', function (e) {
            // Add pulse animation
            this.style.transform = 'scale(0.98)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 150);

            // Log contact action
            console.log('Contact button clicked - Opening email client');

            // Create particle effect
            createParticles(this);
        });

        // Create ripple effect
        function createRipple(event, element) {
            const ripple = document.createElement('span');
            const rect = element.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = event.clientX - rect.left - size / 2;
            const y = event.clientY - rect.top - size / 2;

            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.position = 'absolute';
            ripple.style.borderRadius = '50%';
            ripple.style.background = 'rgba(255, 255, 255, 0.3)';
            ripple.style.transform = 'scale(0)';
            ripple.style.animation = 'rippleEffect 0.6s ease-out';
            ripple.style.pointerEvents = 'none';

            element.style.position = 'relative';
            element.style.overflow = 'hidden';
            element.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 600);
        }

        // Add ripple animation to stylesheet
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleEffect {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Create particles effect for contact button
        function createParticles(element) {
            const rect = element.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'fixed';
                particle.style.left = rect.left + rect.width / 2 + 'px';
                particle.style.top = rect.top + rect.height / 2 + 'px';
                particle.style.width = '6px';
                particle.style.height = '6px';
                particle.style.borderRadius = '50%';
                particle.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '1000';
                particle.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                document.body.appendChild(particle);

                const angle = (i * 45) * (Math.PI / 180);
                const distance = 80;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;

                setTimeout(() => {
                    particle.style.transform = `translate(${tx}px, ${ty}px)`;
                    particle.style.opacity = '0';
                    particle.style.width = '2px';
                    particle.style.height = '2px';
                }, 10);

                setTimeout(() => {
                    particle.remove();
                }, 800);
            }
        }

        // Scroll reveal animation
        window.addEventListener('scroll', function () {
            const elements = document.querySelectorAll('.social-btn, .contact-btn');
            elements.forEach(el => {
                const rect = el.getBoundingClientRect();
                const isVisible = rect.top < window.innerHeight && rect.bottom >= 0;
                if (isVisible) {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }
            });
        });

        // Add smooth scrolling to all links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Keyboard navigation support
        document.addEventListener('keydown', function (e) {
            // ESC key to close offcanvas
            if (e.key === 'Escape') {
                const offcanvas = bootstrap.Offcanvas.getInstance(document.getElementById('offcanvasNav'));
                if (offcanvas) {
                    offcanvas.hide();
                }
            }

            // M key for menu
            if (e.key === 'm' || e.key === 'M') {
                const offcanvas = new bootstrap.Offcanvas(document.getElementById('offcanvasNav'));
                offcanvas.show();
            }
        });

        // Update links with actual URLs (replace # with real links)
        function updateSocialLinks() {
            const links = {
                linkedin: 'https://linkedin.com/in/shaquille',
                twitter: 'https://twitter.com/shaquille',
                whatsapp: 'https://wa.me/234', // Replace with actual WhatsApp number
                instagram: 'https://instagram.com/shaquille'
            };

            // This function can be used to dynamically update links
            console.log('Social links ready to be configured');
        }

        // Add typing animation to job title (optional enhancement)
        let titleElement = document.querySelector('.job-title');
        if (titleElement) {
            titleElement.addEventListener('mouseenter', function () {
                this.style.letterSpacing = '5px';
            });

            titleElement.addEventListener('mouseleave', function () {
                this.style.letterSpacing = '3px';
            });
        }

        // Performance optimization - lazy load images if any
        if ('loading' in HTMLImageElement.prototype) {
            const images = document.querySelectorAll('img');
            images.forEach(img => {
                img.loading = 'lazy';
            });
        }

        // Add resize handler for responsive adjustments
        let resizeTimer;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function () {
                // Adjust any dynamic sizing here
                const vh = window.innerHeight * 0.01;
                document.documentElement.style.setProperty('--vh', `${vh}px`);
            }, 250);
        });

        // Initialize custom properties
        const vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);

        // Console welcome message
        console.log('%c🎨 Business Card by Sulaimon Abdulmalique Shaquille', 'font-size: 16px; font-weight: bold; color: #a78bfa;');
        console.log('%c👨‍💻 Front End Developer Portfolio', 'font-size: 14px; color: #667eea;');
    </script>
